<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body { font-family: Arial; background:#121212; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
        .login-container { background:#1a1a1a; padding:40px; border-radius:12px; width:100%; max-width:400px; box-shadow:0 10px 30px rgba(255,165,0,0.25); }
        h2 { text-align:center; color:#ffa500; margin-bottom:25px; }
        input { width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #333; background:#222; color:#fff; }
        input:focus { outline:none; border-color:#ffa500; box-shadow:0 0 10px rgba(255,165,0,0.5); }
        button { width:100%; padding:14px; background:#ffa500; color:#000; border:none; border-radius:10px; cursor:pointer; font-weight:bold; }
        button:hover { background:#ff8c00; }
        .messages { list-style:none; padding:0; color:#ff4d4d; text-align:center; margin-bottom:15px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Admin Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="messages">
                    {% for category, message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('admin_login') }}">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
